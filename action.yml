name: 'Capawesome Cloud Live Update Action for GitHub Actions'
description: 'Deploy Live Updates with Capawesome Cloud.'
author: 'Robin Genz <mail@robingenz.dev>'

branding:
  icon: 'arrow-up-circle'
  color: 'purple'

inputs:
  appId:
    description: 'The Capawesome Cloud app ID.'
    required: true
  androidEq:
    description: 'The exact Android version code (`versionCode`) that the bundle does not support.'
  androidMax:
    description: 'The maximum Android version code (`versionCode`) that the bundle supports.'
  androidMin:
    description: 'The minimum Android version code (`versionCode`) that the bundle supports.'
  artifactType:
    description: 'The artifact type to deploy. Must be either `zip` or `manifest`. Defaults to `zip`. Used with cloud uploads only.'
  certificate:
    description: 'The name of the certificate to use for the cloud build. Triggers a cloud build.'
  channel:
    description: 'The channel(s) to deploy to, one per line or comma-separated. Deploying to multiple channels is supported for cloud builds only. Each channel is created automatically if it does not exist.'
  customProperties:
    description: 'Custom properties to assign to the bundle, one `key=value` pair per line or comma-separated. Maximum of 10.'
  environment:
    description: 'The name of the environment to use for the cloud build. Triggers a cloud build.'
  gitRef:
    description: 'The Git reference (branch, tag, or commit SHA) to associate with the bundle. For cloud builds, the reference that is built.'
  iosEq:
    description: 'The exact iOS bundle version (`CFBundleVersion`) that the bundle does not support.'
  iosMax:
    description: 'The maximum iOS bundle version (`CFBundleVersion`) that the bundle supports.'
  iosMin:
    description: 'The minimum iOS bundle version (`CFBundleVersion`) that the bundle supports.'
  path:
    description: 'For cloud uploads, the path to the bundle to upload (a folder or zip archive). For cloud builds, the path to the local source files. For self-hosted bundles, an optional zip archive used for code signing only.'
  privateKey:
    description: 'The private key to sign the bundle with. Either a path to a `.pem` file or the key content. Used with cloud uploads and self-hosted bundles only.'
  rolloutPercentage:
    description: 'The percentage of devices to deploy the bundle to (0-100). Defaults to 100.'
  stack:
    description: 'The build stack to use for the cloud build (e.g. `macos-sequoia` or `macos-tahoe`). Triggers a cloud build.'
  url:
    description: 'For self-hosted bundles, the URL of the bundle to register. For cloud builds, the URL of a zip archive to use as the build source.'
  variableFile:
    description: 'Path to a `.env` file with environment variables for the cloud build. Triggers a cloud build.'
  variables:
    description: 'Environment variables for the cloud build, one `key=value` pair per line or comma-separated. Triggers a cloud build.'
  token:
    description: 'The Capawesome Cloud API token.'
    required: true

runs:
  using: composite
  steps:
    - name: Mask secrets
      shell: bash
      env:
        CAPAWESOME_TOKEN: ${{ inputs.token }}
        PRIVATE_KEY: ${{ inputs.privateKey }}
        VARIABLES: ${{ inputs.variables }}
      run: |
        set -euo pipefail
        mask() {
          local line escaped
          while IFS= read -r line; do
            if [ -z "$line" ]; then continue; fi
            escaped="${line//%/%25}"
            escaped="${escaped//$'\r'/%0D}"
            echo "::add-mask::$escaped"
          done <<< "$1"
        }
        mask "$CAPAWESOME_TOKEN"
        mask "$PRIVATE_KEY"
        variables="$VARIABLES"
        case "$variables" in
          *$'\n'*) : ;;
          *) variables="${variables//,/$'\n'}" ;;
        esac
        while IFS= read -r variable; do
          if [ -z "$variable" ]; then continue; fi
          mask "${variable#*=}"
        done <<< "$variables"
    - name: Create channels
      if: inputs.channel != ''
      shell: bash
      env:
        CAPAWESOME_TOKEN: ${{ inputs.token }}
        APP_ID: ${{ inputs.appId }}
        CHANNEL: ${{ inputs.channel }}
      run: |
        set -euo pipefail
        split() {
          local input="$1" item
          case "$input" in
            *$'\n'*) : ;;
            *) input="${input//,/$'\n'}" ;;
          esac
          while IFS= read -r item; do
            item="${item#"${item%%[![:space:]]*}"}"
            item="${item%"${item##*[![:space:]]}"}"
            if [ -n "$item" ]; then printf '%s\n' "$item"; fi
          done <<< "$input"
        }
        while IFS= read -r channel; do
          npx -y @capawesome/cli@4.11.0 apps:channels:create \
            --app-id "$APP_ID" \
            --name "$channel" \
            --ignore-errors
        done < <(split "$CHANNEL")
    - name: Deploy live update
      shell: bash
      env:
        CAPAWESOME_TOKEN: ${{ inputs.token }}
        APP_ID: ${{ inputs.appId }}
        ANDROID_EQ: ${{ inputs.androidEq }}
        ANDROID_MAX: ${{ inputs.androidMax }}
        ANDROID_MIN: ${{ inputs.androidMin }}
        ARTIFACT_TYPE: ${{ inputs.artifactType }}
        CERTIFICATE: ${{ inputs.certificate }}
        CHANNEL: ${{ inputs.channel }}
        CUSTOM_PROPERTIES: ${{ inputs.customProperties }}
        ENVIRONMENT: ${{ inputs.environment }}
        GIT_REF: ${{ inputs.gitRef }}
        IOS_EQ: ${{ inputs.iosEq }}
        IOS_MAX: ${{ inputs.iosMax }}
        IOS_MIN: ${{ inputs.iosMin }}
        BUNDLE_PATH: ${{ inputs.path }}
        PRIVATE_KEY: ${{ inputs.privateKey }}
        ROLLOUT_PERCENTAGE: ${{ inputs.rolloutPercentage }}
        STACK: ${{ inputs.stack }}
        URL: ${{ inputs.url }}
        VARIABLE_FILE: ${{ inputs.variableFile }}
        VARIABLES: ${{ inputs.variables }}
      run: |
        set -euo pipefail
        split() {
          local input="$1" item
          case "$input" in
            *$'\n'*) : ;;
            *) input="${input//,/$'\n'}" ;;
          esac
          while IFS= read -r item; do
            item="${item#"${item%%[![:space:]]*}"}"
            item="${item%"${item##*[![:space:]]}"}"
            if [ -n "$item" ]; then printf '%s\n' "$item"; fi
          done <<< "$input"
        }
        if [ -n "$CERTIFICATE" ] || [ -n "$ENVIRONMENT" ] || [ -n "$STACK" ] || [ -n "$VARIABLES" ] || [ -n "$VARIABLE_FILE" ]; then
          command="apps:liveupdates:create"
        elif [ -n "$URL" ]; then
          command="apps:liveupdates:register"
        elif [ -n "$BUNDLE_PATH" ]; then
          command="apps:liveupdates:upload"
        else
          command="apps:liveupdates:create"
        fi
        args=("$command" --app-id "$APP_ID" --yes)
        if [ -n "$BUNDLE_PATH" ];        then args+=(--path "$BUNDLE_PATH"); fi
        if [ -n "$URL" ];                then args+=(--url "$URL"); fi
        while IFS= read -r channel; do args+=(--channel "$channel"); done < <(split "$CHANNEL")
        if [ -n "$GIT_REF" ];            then args+=(--git-ref "$GIT_REF"); fi
        if [ -n "$ROLLOUT_PERCENTAGE" ]; then args+=(--rollout-percentage "$ROLLOUT_PERCENTAGE"); fi
        if [ -n "$ANDROID_MIN" ];        then args+=(--android-min "$ANDROID_MIN"); fi
        if [ -n "$ANDROID_MAX" ];        then args+=(--android-max "$ANDROID_MAX"); fi
        if [ -n "$ANDROID_EQ" ];         then args+=(--android-eq "$ANDROID_EQ"); fi
        if [ -n "$IOS_MIN" ];            then args+=(--ios-min "$IOS_MIN"); fi
        if [ -n "$IOS_MAX" ];            then args+=(--ios-max "$IOS_MAX"); fi
        if [ -n "$IOS_EQ" ];             then args+=(--ios-eq "$IOS_EQ"); fi
        while IFS= read -r property; do args+=(--custom-property "$property"); done < <(split "$CUSTOM_PROPERTIES")
        if [ "$command" = "apps:liveupdates:create" ]; then
          if [ -n "$CERTIFICATE" ];   then args+=(--certificate "$CERTIFICATE"); fi
          if [ -n "$ENVIRONMENT" ];   then args+=(--environment "$ENVIRONMENT"); fi
          if [ -n "$STACK" ];         then args+=(--stack "$STACK"); fi
          if [ -n "$VARIABLE_FILE" ]; then args+=(--variable-file "$VARIABLE_FILE"); fi
          while IFS= read -r variable; do args+=(--variable "$variable"); done < <(split "$VARIABLES")
        fi
        if [ "$command" = "apps:liveupdates:upload" ]; then
          if [ -n "$ARTIFACT_TYPE" ]; then args+=(--artifact-type "$ARTIFACT_TYPE"); fi
        fi
        if [ "$command" = "apps:liveupdates:upload" ] || [ "$command" = "apps:liveupdates:register" ]; then
          if [ -n "$PRIVATE_KEY" ]; then args+=(--private-key "$PRIVATE_KEY"); fi
        fi
        npx -y @capawesome/cli@4.11.0 "${args[@]}"
